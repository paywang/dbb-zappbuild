# Application properties used by zAppBuild/language/easytrieve.groovy

#
# default easytrieve program build rank - used to sort language build file list
# leave empty - overridden by file properties if sorting needed
easytrieve_fileBuildRank=

#
# easytrieve dependencySearch configuration
# searchPath defined in application.properties
easytrieve_dependencySearch=${eztMacSearch}

#
# default easytrieve compiler version
# can be overridden by file properties
easytrieve_compilerVersion=T0
#easytrieve_compilerVersion=P0
#
# default easytrieve maximum RCs allowed
# can be overridden by file properties
easytrieve_compileMaxRC=4
easytrieve_linkEditMaxRC=4

#
# lists of properties which should cause a rebuild after being changed
easytrieve_impactPropertyList=easytrieve_compilerVersion,easytrieve_compileParms
easytrieve_impactPropertyListCICS=easytrieve_compileCICSParms
easytrieve_impactPropertyListSQL=easytrieve_compileSQLParms

#
# default easytrieve compiler parameters
# can be overridden by file properties
easytrieve_compileStream=PARM LINK(@{member}(R)) PRESIZE 2048
easytrieve_compileCICSParms=CICS
easytrieve_compileSQLParms=SQL
easytrieve_compileErrorPrefixParms=ADATA,EX(ADX(ELAXMGUX))

# Compile Options for IBM Debugger. Assuming to keep Dwarf Files inside the load.
# If you would like to separate debug info, additional allocations needed (See easytrieve + Debugger libraries)
#easytrieve_compileDebugParms=TEST
#//SYSIN       DD *
#LIST ON MACROS
#PARM DEBUG(PMAP DMAP STATE XREF LONG) ABEXIT NO SORT(MSG(ALL)) +
#LIST FILE COMPILE
easytrieve_compileDebugParms=

#
# default LinkEdit parameters
# can be overridden by file properties
easytrieve_linkEditParms=LIST,MAP,XREF
#easytrieve_linkEditParms = AMODE(24),RMODE(24) :: **/A24R24/*.ezt
#easytrieve_linkEditParms = AMODE(31),RMODE(24) :: **/A31R24/*.ezt
#easytrieve_linkEditParms = AMODE(31),RMODE(ANY) :: **/A31RANY/*.ezt



# Optional linkEditStream defining additional link instructions via SYSIN dd
# easytrieve_linkEditStream=    INCLUDE SYSLIB(COBJT) \n
easytrieve_linkEditStream=

# If using a debug exit for IBM Debug tool, provide the SYSIN instream DD which is appended to SYSIN
# Samp: easytrieve_linkDebugExit=    INCLUDE SYSLIB(EQAD3CXT) \n
easytrieve_linkDebugExit=

#
# execute link edit step
# can be overridden by file properties
easytrieve_linkEdit=true

#
# store abbrev git hash in ssi field
# available for buildTypes impactBuild, mergeBuild and fullBuild
# can be overridden by file properties
easytrieve_storeSSI=true

#
# flag to generate IDENTIFY statement during link edit phase
# to create an user data record (IDRU) to "sign" the load module with
# an identify String: <application>/<abbreviatedGitHash>
# to increase traceability
#
# can be overridden by file properties
# default: true
easytrieve_identifyLoad=false

#
# default deployType
easytrieve_deployType=LOAD

#
# deployType for build files with isCICS=true
easytrieve_deployTypeCICS=CICSLOAD

#
# deployType for build files with isDLI=true
easytrieve_deployTypeDLI=IMSLOAD

#
# deployType for build files with isIMS=true
easytrieve_deployTypeIMS=IMSLOAD

#
# scan link edit load module for link dependencies
# can be overridden by file properties
easytrieve_scanLoadModule=true

#
# additional libraries for compile SYSLIB concatenation, comma-separated
easytrieve_compileSyslibConcatenation=TMNTORG.LPSSORZZ.MACLIB00,CMNTORG.LPSSORZZ.MACLIB00,PMNTORG.LPSSORZZ.MACLIB00,PSYSEZT.LPSSORZZ.MACLIB00

#
# additional libraries for linkEdit SYSLIB concatenation, comma-separated
easytrieve_linkEditSyslibConcatenation=TMNTORG.LPSSORZZ.LODLIB00,CMNTORG.LPSSORZZ.LODLIB00,PMNTORG.LPSSORZZ.LODLIB00


# adding option for change control validation
easytrieve_changeCDMF=false
